name: Check RES updates

on:
  push:
    branches:
      - main
  schedule:
    - cron: "3 23 * * *"
    - cron: "3,13,23,33,43,53 1-7 * * *"
    - cron: "3,13,23,33,43,53 9-16 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources, e.g. NAVER_LOUNGE,YOUTUBE"
        required: false
        default: "NAVER_LOUNGE,YOUTUBE"
      test_notify:
        description: "Send one [TEST] Discord notification and skip collection/state updates"
        required: false
        default: "false"
      send_test_notification:
        description: "Legacy alias for test_notify"
        required: false
        default: "false"

concurrency:
  group: resonance-update-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
      ENABLE_PLAYWRIGHT_FALLBACK: "false"
      ENABLE_X_COLLECTOR: "false"
      ENABLE_WEIBO_COLLECTOR: "false"
      SOURCES: ${{ github.event.inputs.sources || 'NAVER_LOUNGE,YOUTUBE' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Verify
        run: npm run verify

      - name: Send test notification
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.test_notify == 'true' || github.event.inputs.send_test_notification == 'true') }}
        run: npm run test:notify

      - name: Check updates
        if: ${{ github.event_name != 'push' && !(github.event_name == 'workflow_dispatch' && (github.event.inputs.test_notify == 'true' || github.event.inputs.send_test_notification == 'true')) }}
        run: npm run check:updates

      - name: Commit state
        if: ${{ always() && github.event_name != 'push' && !(github.event_name == 'workflow_dispatch' && (github.event.inputs.test_notify == 'true' || github.event.inputs.send_test_notification == 'true')) }}
        run: |
          if git diff --quiet -- data/state.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "Update feed monitor state [skip ci]"
          git pull --rebase
          git push
