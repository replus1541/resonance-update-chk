name: Check RES updates

on:
  schedule:
    - cron: "3/5 * * * *"
    - cron: "17,47 * * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources, e.g. NAVER_LOUNGE,YOUTUBE"
        required: false
        default: "NAVER_LOUNGE,YOUTUBE"

concurrency:
  group: resonance-update-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_USERNAME: RES Update Monitor
      ENABLE_PLAYWRIGHT_FALLBACK: "false"
      ENABLE_X_COLLECTOR: "false"
      ENABLE_WEIBO_COLLECTOR: "false"
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
      SOURCES: ${{ github.event.inputs.sources }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run check:updates

      - name: Commit state
        run: |
          if git diff --quiet -- data/state.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "Update feed monitor state [skip ci]"
          git pull --rebase
          git push
